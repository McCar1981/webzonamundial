name: Cron frequent (every 15 min)

# Free alternative to Vercel Pro crons for the medium-frequency endpoints
# (predictions + Zona de Ligas resolution, stories). Hobby cannot schedule
# sub-daily crons, so GitHub Actions triggers them every 15 min.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   - SITE_URL      e.g. https://www.zonamundial.app
#   - CRON_SECRET   must match the env var on the Vercel deploy

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger frequent cron endpoints
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing SITE_URL or CRON_SECRET secrets"
            exit 1
          fi
          endpoints=(
            "/api/cron/resolve-predictions"
            "/api/cron/resolve-liga-predictions"
            "/api/cron/resolve-liga-fantasy"
            "/api/stories/generate"
          )
          for ep in "${endpoints[@]}"; do
            echo "--- $ep"
            code=$(curl -sS -m 180 -o /tmp/resp -w "%{http_code}" \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$SITE_URL$ep" || echo "000")
            echo "HTTP $code"
            head -c 400 /tmp/resp 2>/dev/null || true
            echo ""
            if [ "$code" != "200" ]; then
              echo "::warning::$ep returned $code"
            fi
          done
