name: Cron live (every 10 min)

# Free alternative to Vercel Pro crons for the real-time endpoints.
# The Hobby plan can only schedule crons once per day, so the live/match
# endpoints are triggered here instead. All of them self-gate (they no-op when
# there is no live match).
#
# Cadencia 10 min (antes 5): cada tick, match-center-poll y poll-ligas-live hacen
# un /fixtures?live=all a api-football aunque no haya nada en vivo (~576 llamadas/
# día entre los dos). Con el Mundial ya terminado y las micro-predicciones en
# vivo aún sin validar, 10 min recorta ese consumo base a la mitad sin coste real.
# Para precisión de 1 min durante partidos en vivo, apuntar cron-job.org a los
# endpoints concretos (ver abajo) puntualmente.
#
# For true 1-minute precision during live matches you can additionally point
# cron-job.org at match-center-poll / resolve-micro / settle-live-picks.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   - SITE_URL      e.g. https://www.zonamundial.app
#   - CRON_SECRET   must match the env var on the Vercel deploy

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger live cron endpoints
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing SITE_URL or CRON_SECRET secrets"
            exit 1
          fi
          endpoints=(
            "/api/cron/match-center-poll"
            "/api/cron/poll-ligas-live"
            "/api/cron/resolve-micro"
            "/api/cron/settle-live-picks"
            "/api/cron/stage-results"
            "/api/cron/monitor"
            "/api/cron/match-reminders"
          )
          for ep in "${endpoints[@]}"; do
            echo "--- $ep"
            code=$(curl -sS -m 120 -o /tmp/resp -w "%{http_code}" \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$SITE_URL$ep" || echo "000")
            echo "HTTP $code"
            head -c 400 /tmp/resp 2>/dev/null || true
            echo ""
            if [ "$code" != "200" ]; then
              echo "::warning::$ep returned $code"
            fi
          done
