name: Generate blog post (every 2 days)

# Genera 1 post nuevo cada 2 d\u00edas a las 09:00 UTC (11:00 Espa\u00f1a).
# Coincide aprox con el ritmo M-J-S que ya ten\u00edas en el calendario editorial.
#
# Requiere los mismos secrets que ingest-news:
#   - SITE_URL
#   - CRON_SECRET

on:
  schedule:
    # Cada 2 d\u00edas a las 09:00 UTC. Cron de GitHub no soporta '*/2' en day,
    # pero 'pares' del mes funciona razonablemente (2, 4, 6, ..., 30).
    - cron: "0 9 2-30/2 * *"
  workflow_dispatch: # permite disparar manualmente desde Actions UI

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger generate-blog-post endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing SITE_URL or CRON_SECRET secrets"
            exit 1
          fi
          curl -fsSL -m 300 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/generate-blog-post" \
            -o response.json
          cat response.json
