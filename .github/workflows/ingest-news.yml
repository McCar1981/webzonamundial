name: Ingest news (hourly)

# Free alternative to Vercel Pro crons. Hits the deployed cron endpoint
# every hour using the CRON_SECRET stored as a repo secret.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   - SITE_URL          e.g. https://www.zonamundial.app
#   - CRON_SECRET       must match the env var on Vercel

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: # allow manual run from the Actions tab
    inputs:
      beats:
        description: "Beats a forzar (coma-separados, p.ej. squad,injuries,stars). Vacío = rotación normal por hora."
        required: false
        default: ""
      backfill:
        description: "Recuperación histórica: nº de días atrás a barrer (máx 30). Vacío/0 = ingesta normal."
        required: false
        default: ""

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BEATS: ${{ github.event.inputs.beats }}
          BACKFILL: ${{ github.event.inputs.backfill }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing SITE_URL or CRON_SECRET secrets"
            exit 1
          fi
          URL="$SITE_URL/api/cron/ingest-news"
          SEP="?"
          if [ -n "$BEATS" ]; then
            URL="$URL${SEP}beats=$BEATS"
            SEP="&"
            echo "Forzando beats: $BEATS"
          fi
          if [ -n "$BACKFILL" ] && [ "$BACKFILL" != "0" ]; then
            URL="$URL${SEP}backfill=$BACKFILL"
            SEP="&"
            echo "Backfill histórico: $BACKFILL días"
          fi
          curl -fsSL -m 300 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$URL" \
            -o response.json
          cat response.json
