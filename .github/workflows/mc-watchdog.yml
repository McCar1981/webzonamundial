name: Match center watchdog (1 min en partido)

# POR QUÉ EXISTE
# Los crons programados de GitHub Actions en repos gratuitos se retrasan MUCHO:
# medimos pasadas de 70-140 min con `*/5 * * * *`. El 15-jul eso dejó la
# semifinal congelada en "por comenzar" (el poller no corría). Este workflow NO
# depende del scheduler: arranca un job largo que sondea cada 60 s y, antes de
# agotar su límite, SE RE-LANZA a sí mismo -> cobertura continua de verdad.
#
# COSTE: el repo es PÚBLICO, así que los minutos de Actions son gratis e
# ilimitados. Para no gastar invocaciones de Vercel (plan Hobby) en balde, el
# bucle SOLO sondea dentro de la ventana de partido (en vivo, o desde 2 h antes
# del saque para que salgan recordatorio ~90 min y previa ~60 min); fuera de
# ella solo consulta /today, que va cacheado en CDN.
#
# El `schedule` de abajo es solo RED DE SEGURIDAD: si la cadena se rompiera
# (fallo del runner), lo reanuda. `concurrency` impide que corran dos a la vez.
#
# Secrets necesarios: SITE_URL, CRON_SECRET.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: mc-watchdog
  cancel-in-progress: false

permissions:
  actions: write # para re-lanzarse

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # el límite duro de un job son 360
    steps:
      - name: Sondear el Match Center mientras haya partido
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -u
          if [ -z "${SITE_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Faltan los secrets SITE_URL o CRON_SECRET"
            exit 1
          fi
          END=$(( $(date -u +%s) + 330 * 60 ))   # 5 h 30 min, deja margen al timeout
          EPS="/api/cron/match-center-poll /api/cron/resolve-micro /api/cron/settle-live-picks /api/cron/stage-results /api/cron/match-reminders /api/cron/monitor"
          active_cycles=0

          while [ "$(date -u +%s)" -lt "$END" ]; do
            NOW=$(date -u +%s)
            TODAY=$(curl -sS -m 25 "$SITE_URL/api/match-center/today" 2>/dev/null || echo '')

            # ¿Ventana de partido? = algún partido sin terminar que esté EN VIVO
            # o cuyo saque caiga entre hace 4 h y dentro de 2 h.
            GATE=$(printf '%s' "$TODAY" | jq -r --argjson now "$NOW" '
              [ .matches[]?
                | select(.finished != true)
                | . as $m
                | (($m.kickoff // "") | sub("\\+00:00$"; "Z")) as $k
                | ((try ($k | fromdateiso8601) catch null)) as $ts
                | select(($m.live == true)
                         or ($ts != null and ($ts - $now) <= 7200 and ($ts - $now) >= -14400))
              ] | length' 2>/dev/null || echo 0)
            [ -z "$GATE" ] && GATE=0

            if [ "$GATE" -gt 0 ]; then
              active_cycles=$((active_cycles + 1))
              echo "--- $(date -u +%H:%M:%S) ventana ACTIVA ($GATE partido/s) — sondeando"
              for ep in $EPS; do
                code=$(curl -sS -m 60 -o /dev/null -w "%{http_code}" \
                  -H "Authorization: Bearer $CRON_SECRET" "$SITE_URL$ep" 2>/dev/null || echo "000")
                [ "$code" = "200" ] || echo "::warning::$ep -> $code"
              done
              sleep 60
            else
              echo "--- $(date -u +%H:%M:%S) sin partido en ventana — en espera"
              sleep 120
            fi
          done
          echo "Ciclos con partido: $active_cycles"

      - name: Encadenar la siguiente vuelta (cobertura continua)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run mc-watchdog.yml --repo "$GITHUB_REPOSITORY" || \
            echo "::warning::No se pudo re-lanzar; el schedule de respaldo lo reanudará"
