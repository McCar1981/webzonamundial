name: Poll creators live (every 5 min)

# Llama a /api/cron/poll-creators-live cada 5 min para mantener el
# banner social-proof actualizado.
#
# Cada 5 min es buen balance: si Coscu empieza un live a las 18:00,
# aparece en el banner como m\u00e1ximo a las 18:05. M\u00e1s frecuente quemar\u00eda
# minutos de Actions sin necesidad (Twitch streams duran 1-6h normal).
#
# Requeridos los mismos secrets que otros crons:
#   - SITE_URL
#   - CRON_SECRET

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger poll endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing SITE_URL or CRON_SECRET secrets"
            exit 1
          fi
          curl -fsSL -m 60 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/poll-creators-live" \
            -o response.json
          cat response.json
